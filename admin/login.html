<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-indigo-600">Admin Login</h2>
        <input type="text" id="adminId" placeholder="Admin User ID" class="w-full p-3 mb-4 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-400">
        <input type="password" id="adminPass" placeholder="Password" class="w-full p-3 mb-6 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-400">
        <button id="loginBtn" class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 transition font-semibold">Login</button>
        <p id="error" class="text-red-500 mt-4 text-sm hidden text-center"></p>
    </div>

    <script type="module">
        import { auth } from '/js/firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const userId = document.getElementById('adminId').value;
            const pass = document.getElementById('adminPass').value;
            const email = userId + "@admin.market.mhg.info.bd"; // Admin ID logic

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                sessionStorage.setItem('adminActive', 'true');
                window.location.href = "index.html";
            } catch (err) {
                document.getElementById('error').innerText = "ভুল ইউজার আইডি বা পাসওয়ার্ড!";
                document.getElementById('error').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
