<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | Market MHG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome আইকনের জন্য -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-gray-100">
        <!-- লোগো বা আইকন সেকশন -->
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg rotate-3">
                <i class="fas fa-user-check text-white text-2xl -rotate-3"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-800">Client Login</h2>
            <p class="text-slate-500 mt-2">আপনার ড্যাশবোর্ডে প্রবেশ করতে আইডি দিন</p>
        </div>

        <!-- ইনপুট ফর্ম -->
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">User ID</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                        <i class="fas fa-at"></i>
                    </span>
                    <input type="text" id="c_id" 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all duration-200" 
                        placeholder="আপনার আইডি (যেমন: shakil)">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="c_pass" 
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition-all duration-200" 
                        placeholder="••••••••">
                </div>
            </div>

            <button id="loginBtn" 
                class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transform transition active:scale-[0.98] shadow-xl shadow-blue-200 flex items-center justify-center gap-3">
                <span>প্রবেশ করুন</span>
                <i class="fas fa-arrow-right-to-bracket"></i>
            </button>
        </div>

        <!-- এরর মেসেজ -->
        <div id="errorBox" class="mt-6 hidden bg-red-50 border border-red-100 p-4 rounded-2xl flex items-center gap-3 text-red-600 animate-pulse">
            <i class="fas fa-circle-exclamation"></i>
            <p id="errorText" class="text-sm font-medium"></p>
        </div>

        <div class="mt-8 text-center">
            <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Secure Access • Market MHG</p>
        </div>
    </div>

    <script type="module">
        // Firebase Config থেকে auth ইম্পোর্ট করা (Firestore আর দরকার নেই লগইনের জন্য)
        import { auth } from '/js/firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const loginBtn = document.getElementById('loginBtn');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');

        loginBtn.addEventListener('click', async () => {
            const userId = document.getElementById('c_id').value.trim();
            const pass = document.getElementById('c_pass').value;

            if (!userId || !pass) {
                showError("আইডি এবং পাসওয়ার্ড উভয়ই প্রয়োজন!");
                return;
            }

            // বাটন লোডিং স্টেট
            loginBtn.disabled = true;
            loginBtn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> যাচাই করা হচ্ছে...`;

            // কাস্টম ইমেইল ফরম্যাট তৈরি
            const email = userId + "@client.market.mhg.info.bd";

            try {
                // Firebase Authentication দিয়ে নিরাপদ লগইন
                await signInWithEmailAndPassword(auth, email, pass);
                
                // সফল হলে রিডাইরেক্ট
                sessionStorage.setItem('sessionActive', 'true'); // সেশন ট্র্যাকিং
                window.location.href = "index.html";

            } catch (error) {
                console.error("Login Error:", error.code);
                
                // ইউজার ফ্রেন্ডলি এরর মেসেজ
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    showError("ভুল ইউজার আইডি অথবা পাসওয়ার্ড!");
                } else if (error.code === 'auth/network-request-failed') {
                    showError("ইন্টারনেট কানেকশন চেক করুন!");
                } else {
                    showError("লগইন করা যাচ্ছে না। অ্যাডমিনের সাথে যোগাযোগ করুন।");
                }

                // বাটন আগের অবস্থায় আনা
                loginBtn.disabled = false;
                loginBtn.innerHTML = `<span>প্রবেশ করুন</span> <i class="fas fa-arrow-right-to-bracket"></i>`;
            }
        });

        function showError(msg) {
            errorText.innerText = msg;
            errorBox.classList.remove('hidden');
            // ৫ সেকেন্ড পর এরর মেসেজ অটো হাইড হবে
            setTimeout(() => errorBox.classList.add('hidden'), 5000);
        }
    </script>
</body>
</html>
